# Builds the HA add-on image for amd64 / aarch64 / armv7 and pushes to GHCR.
#
# Repo: https://github.com/Ruffo324/wsbridge
#
# Uses docker/build-push-action (not home-assistant/builder) so we get the repo
# root as the build context — required because addons/https2wss/Dockerfile is a
# two-stage build whose stage 1 copies pnpm-workspace files from the repo root.
#
# Multi-arch via QEMU + buildx. Each matrix entry maps a target arch to its
# linux/* platform and its HA base image (BUILD_FROM build-arg).
#
# One-time setup after the first push:
#   1. Settings → Actions → General → enable "Read and write permissions".
#   2. After the first successful run, set the GHCR package visibility under
#      your GitHub profile → Packages.

name: Build add-on

on:
  push:
    branches: [master]
    paths:
      - "addons/https2wss/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "tsconfig*.json"
      - ".github/workflows/addon-build.yml"
  workflow_dispatch:
    inputs:
      version_override:
        description: "Override version tag (else uses addons/https2wss/config.yaml)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            base_image: ghcr.io/home-assistant/amd64-base:latest
          - arch: aarch64
            platform: linux/arm64
            base_image: ghcr.io/home-assistant/aarch64-base:latest
          - arch: armv7
            platform: linux/arm/v7
            base_image: ghcr.io/home-assistant/armv7-base:latest

    steps:
      - uses: actions/checkout@v4

      - name: Compute version + lowercased owner
        id: meta
        shell: bash
        run: |
          VERSION=$(grep '^version:' addons/https2wss/config.yaml | awk '{print $2}' | tr -d '"')
          EFFECTIVE="${{ inputs.version_override }}"
          if [ -z "$EFFECTIVE" ]; then
            EFFECTIVE="$VERSION"
          fi
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "version=$EFFECTIVE" >> "$GITHUB_OUTPUT"
          echo "owner=$OWNER_LC" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/$OWNER_LC/${{ matrix.arch }}-https2wss" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.platform }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./addons/https2wss/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false  # avoid GHCR provenance attestation; HA Supervisor parses image manifests strictly
          build-args: |
            BUILD_FROM=${{ matrix.base_image }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
          labels: |
            org.opencontainers.image.title=https2wss
            org.opencontainers.image.description=HTTPS/SSE-to-WebSocket bridge add-on
            org.opencontainers.image.source=https://github.com/Ruffo324/wsbridge
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.licenses=MIT
