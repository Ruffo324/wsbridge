name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable corepack
        # pnpm/action-setup@v4 conflicts with the `packageManager` field in package.json;
        # corepack reads that field directly and activates the pinned pnpm version.
        run: |
          corepack enable
          corepack prepare --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: E2E test
        run: pnpm test:e2e

      - name: Build
        run: pnpm build
