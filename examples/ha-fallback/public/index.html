<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResilientWebSocket fallback demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Courier New", Courier, monospace;
      background: #0e0e0e;
      color: #d4d4d4;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      min-height: 100vh;
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.3rem; color: #c8c8c8; }
    p.subtitle { font-size: 0.8rem; color: #666; margin-bottom: 1.5rem; }
    .panel { width: 100%; max-width: 640px; }
    .controls { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
    .row { display: flex; gap: 0.5rem; }
    label { font-size: 0.75rem; color: #666; }
    input[type="text"], input[type="number"] {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #d4d4d4;
      padding: 0.35rem 0.6rem;
      font-family: inherit;
      font-size: 0.85rem;
    }
    button {
      background: #222;
      border: 1px solid #444;
      color: #aaa;
      padding: 0.35rem 0.75rem;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    button:hover { border-color: #888; color: #ddd; }
    button:disabled { opacity: 0.4; cursor: default; }
    .status-strip {
      background: #111;
      border: 1px solid #222;
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      margin-bottom: 0.75rem;
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .status-strip span { color: #888; }
    .status-strip strong { color: #c8c8c8; }
    .badge-native { color: #7ec8a4; }
    .badge-bridge { color: #b4a47e; }
    pre#log {
      width: 100%;
      background: #111;
      border: 1px solid #222;
      padding: 0.75rem;
      font-size: 0.78rem;
      white-space: pre-wrap;
      word-break: break-all;
      min-height: 180px;
      max-height: 420px;
      overflow-y: auto;
    }
    .ts  { color: #555; }
    .recv { color: #7ec8a4; }
    .sent { color: #7ab4d4; }
    .sys  { color: #b4a47e; }
    .err  { color: #d47a7a; }
    .tc   { color: #c4a0e0; }
    .sep  { border-top: 1px solid #222; margin: 0.75rem 0; }
  </style>
</head>
<body>
  <div class="panel">
    <h1>ResilientWebSocket fallback demo</h1>
    <p class="subtitle">Exercises native-first + bridge-fallback paths interactively</p>

    <div class="controls">
      <label for="bridgeUrl">Bridge URL</label>
      <input id="bridgeUrl" type="text" value="http://localhost:8080" />

      <label for="tokenInput">Bridge token</label>
      <input id="tokenInput" type="text" placeholder="dev-token-1234" />

      <label for="profileInput">Upstream profile (echo or echo-docker)</label>
      <input id="profileInput" type="text" value="echo" />

      <label for="nativeUrl">Native target URL (ws:// — used when native WebSocket is available)</label>
      <input id="nativeUrl" type="text" value="ws://localhost:9001" />

      <div class="row">
        <div style="flex:1">
          <label for="heartbeatMs">Heartbeat timeout ms</label>
          <input id="heartbeatMs" type="number" value="5000" style="width:100%" />
        </div>
        <div style="flex:1">
          <label for="connectMs">Connect timeout ms</label>
          <input id="connectMs" type="number" value="3000" style="width:100%" />
        </div>
      </div>

      <div class="row">
        <button id="btnAuto" type="button">Connect (auto)</button>
        <button id="btnForceFallback" type="button">Connect (force fallback)</button>
        <button id="btnClearCookie" type="button">Clear sticky cookie</button>
        <button id="btnDisconnect" type="button" disabled>Disconnect</button>
      </div>

      <div class="sep"></div>

      <label for="msgInput">Message</label>
      <div class="row">
        <input id="msgInput" type="text" placeholder="hello" />
        <button id="btnSend" type="button" disabled>Send text</button>
        <button id="btnSendBinary" type="button" disabled>Send binary</button>
      </div>
    </div>

    <div class="status-strip" id="statusStrip">
      <span>readyState: <strong id="stateVal">—</strong></span>
      <span>transport: <strong id="transportVal">—</strong></span>
      <span>last reason: <strong id="reasonVal">—</strong></span>
    </div>

    <pre id="log"># log output appears here
</pre>
  </div>

  <script type="module">
    import { ResilientWebSocket } from "/lib/client/index.js";

    const STATE_NAMES = ["CONNECTING", "OPEN", "CLOSING", "CLOSED"];

    const log     = document.getElementById("log");
    const stateEl = document.getElementById("stateVal");
    const transEl = document.getElementById("transportVal");
    const reasonEl = document.getElementById("reasonVal");

    const bridgeUrlInput = document.getElementById("bridgeUrl");
    const tokenInput     = document.getElementById("tokenInput");
    const profileInput   = document.getElementById("profileInput");
    const nativeUrlInput = document.getElementById("nativeUrl");
    const heartbeatMsEl  = document.getElementById("heartbeatMs");
    const connectMsEl    = document.getElementById("connectMs");
    const msgInput       = document.getElementById("msgInput");

    const btnAuto         = document.getElementById("btnAuto");
    const btnForceFallback = document.getElementById("btnForceFallback");
    const btnClearCookie  = document.getElementById("btnClearCookie");
    const btnDisconnect   = document.getElementById("btnDisconnect");
    const btnSend         = document.getElementById("btnSend");
    const btnSendBinary   = document.getElementById("btnSendBinary");

    // Restore token from localStorage
    const storedToken = localStorage.getItem("https2wss_token");
    if (storedToken) tokenInput.value = storedToken;

    let socket = null;

    function ts() {
      return new Date().toISOString().slice(11, 23);
    }

    function appendLog(cls, text) {
      const lines = log.textContent.split("\n");
      if (lines.length > 200) {
        log.textContent = `${lines.slice(lines.length - 190).join("\n")}\n`;
      }
      log.innerHTML += `<span class="ts">[${ts()}]</span> <span class="${cls}">${text}</span>\n`;
      log.scrollTop = log.scrollHeight;
    }

    function updateStatus(ws) {
      if (!ws) { stateEl.textContent = "—"; transEl.textContent = "—"; return; }
      stateEl.textContent = `${ws.readyState} (${STATE_NAMES[ws.readyState] ?? "?"})`;
      const t = ws.transport;
      transEl.className = t === "native" ? "badge-native" : "badge-bridge";
      transEl.textContent = t;
    }

    function setConnected(yes) {
      btnAuto.disabled = yes;
      btnForceFallback.disabled = yes;
      btnDisconnect.disabled = !yes;
      btnSend.disabled = !yes;
      btnSendBinary.disabled = !yes;
    }

    function buildInit(forceFallback) {
      const bridgeUrl = bridgeUrlInput.value.trim();
      const token     = tokenInput.value.trim();
      const profile   = profileInput.value.trim() || "echo";
      const nativeUrl = nativeUrlInput.value.trim();
      const heartbeatTimeoutMs = Number(heartbeatMsEl.value) || 5000;
      const nativeConnectTimeoutMs = Number(connectMsEl.value) || 3000;

      if (token) localStorage.setItem("https2wss_token", token);

      const init = {
        bridge: {
          bridgeUrl,
          authToken: token || undefined,
          upstreamProfile: profile,
        },
        nativeConnectTimeoutMs,
        heartbeatTimeoutMs,
      };

      if (forceFallback) {
        // Inject a constructor that throws — causes immediate connect-failure fallback
        init.webSocketCtor = function BadWS() {
          throw new Error("forced fallback: native WebSocket disabled for this connection");
        };
      }

      return { nativeUrl, init };
    }

    function connect(forceFallback) {
      if (socket) { socket.close(1000, "reconnect"); socket = null; }

      const { nativeUrl, init } = buildInit(forceFallback);
      appendLog("sys", `connecting — target: ${nativeUrl} (force fallback: ${forceFallback})`);

      socket = new ResilientWebSocket(nativeUrl, init);

      socket.addEventListener("transport-change", (ev) => {
        reasonEl.textContent = ev.detail.reason;
        transEl.textContent = ev.detail.to;
        transEl.className = ev.detail.to === "native" ? "badge-native" : "badge-bridge";
        appendLog("tc", `transport-change: ${ev.detail.from} -> ${ev.detail.to} (reason: ${ev.detail.reason})`);
        updateStatus(socket);
      });

      socket.onopen = () => {
        appendLog("sys", "open");
        setConnected(true);
        updateStatus(socket);
      };

      socket.onmessage = (ev) => {
        if (ev.data instanceof ArrayBuffer) {
          const bytes = new Uint8Array(ev.data);
          const hex = Array.from(bytes).map(b => b.toString(16).padStart(2, "0")).join(" ");
          appendLog("recv", `← [binary] ${hex}`);
        } else {
          appendLog("recv", `← ${ev.data}`);
        }
        updateStatus(socket);
      };

      socket.onerror = () => {
        appendLog("err", "socket error");
        updateStatus(socket);
      };

      socket.onclose = (ev) => {
        appendLog("sys", `closed (code ${ev.code ?? "?"}, reason: ${ev.reason || "none"})`);
        setConnected(false);
        updateStatus(socket);
        socket = null;
      };

      updateStatus(socket);
    }

    btnAuto.addEventListener("click", () => connect(false));
    btnForceFallback.addEventListener("click", () => connect(true));

    btnClearCookie.addEventListener("click", () => {
      // biome-ignore lint/suspicious/noDocumentCookie: intentional cookie deletion (same pattern as resilient/cookies.ts)
      document.cookie = "h2w-fallback=; Max-Age=0; Path=/;";
      appendLog("sys", "sticky cookie cleared — next Connect will re-evaluate native");
    });

    btnDisconnect.addEventListener("click", () => {
      socket?.close(1000, "user disconnect");
    });

    btnSend.addEventListener("click", () => {
      const text = msgInput.value;
      if (!text || !socket) return;
      socket.send(text);
      appendLog("sent", `→ ${text}`);
    });

    btnSendBinary.addEventListener("click", () => {
      if (!socket) return;
      const buf = Uint8Array.from([0, 1, 2, 3, 4]).buffer;
      socket.send(buf);
      appendLog("sent", "→ [binary] 00 01 02 03 04");
    });

    msgInput.addEventListener("keydown", (ev) => {
      if (ev.key === "Enter") btnSend.click();
    });
  </script>
</body>
</html>
