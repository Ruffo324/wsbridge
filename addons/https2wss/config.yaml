---
name: "https2wss"
version: "0.1.7"
slug: "https2wss"
description: "HTTPS/SSE-to-WebSocket bridge — lets HTTPS-only clients talk to WebSocket upstreams."
url: "https://github.com/Ruffo324/wsbridge"
# Pre-built image location; Supervisor substitutes {arch}.
# Pushed by .github/workflows/addon-build.yml.
image: "ghcr.io/ruffo324/{arch}-https2wss"
arch:
  # armv7 omitted: Node 24 dropped armv7 from all official Docker images.
  - amd64
  - aarch64
startup: services
boot: auto
init: false
ports:
  "8080/tcp": 8080
ports_description:
  "8080/tcp": "https2wss bridge HTTP API"
hassio_api: true
homeassistant_api: false
host_network: false
apparmor: true
options:
  token: ""
  upstream_profile_name: "ha-core"
  upstream_url: "ws://homeassistant:8123/api/websocket"
  upstream_allow_private_network: true
  allowed_origins: []
  log_level: "info"
  idle_timeout_ms: 120000
  max_frame_bytes: 1048576
  frontend_proxy_enabled: false
  frontend_proxy_path: "/"
  frontend_proxy_upstream_url: "http://homeassistant:8123"
  frontend_proxy_inject_websocket_shim: true
  frontend_proxy_bridge_url: ""
  frontend_proxy_native_connect_timeout_ms: 1500
  frontend_proxy_heartbeat_timeout_ms: 30000
schema:
  token: "str"
  upstream_profile_name: "str"
  upstream_url: "url"
  upstream_allow_private_network: "bool"
  allowed_origins:
    - "str?"
  log_level: "list(fatal|error|warn|info|debug|trace)"
  idle_timeout_ms: "int(1000,3600000)"
  max_frame_bytes: "int(1024,16777216)"
  frontend_proxy_enabled: "bool"
  frontend_proxy_path: "str"
  frontend_proxy_upstream_url: "url"
  frontend_proxy_inject_websocket_shim: "bool"
  frontend_proxy_bridge_url: "str?"
  frontend_proxy_native_connect_timeout_ms: "int(0,30000)"
  frontend_proxy_heartbeat_timeout_ms: "int(1000,300000)"
