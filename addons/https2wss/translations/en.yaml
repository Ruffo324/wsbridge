configuration:
  token:
    name: "Bearer token"
    description: >-
      Token clients pass in the `Authorization: Bearer <token>` header to authenticate
      with the bridge. Leave empty to auto-generate one at first start — the generated
      value is logged at startup and saved to `/data/generated-token.txt`.
  upstream_profile_name:
    name: "Upstream profile name"
    description: >-
      Internal name the bridge uses for the upstream WebSocket profile. Clients open
      sessions by referencing this name. Default `ha-core`.
  upstream_url:
    name: "Upstream WebSocket URL"
    description: >-
      WebSocket URL of the service the bridge proxies to. Default
      `ws://homeassistant:8123/api/websocket` targets Home Assistant Core via its
      Supervisor-internal hostname.
  upstream_allow_private_network:
    name: "Allow private network"
    description: >-
      Required when the upstream is on a private IP range (the default HA Core URL
      is). Set to `false` only for public upstreams to enforce SSRF protections.
  allowed_origins:
    name: "Allowed CORS origins"
    description: >-
      List of exact origin URLs allowed to call the bridge from a browser. Leave
      empty to skip the CORS allowlist. Example: `https://my-dashboard.example.com`.
  log_level:
    name: "Log level"
    description: >-
      Logger verbosity. Use `debug` or `trace` only when diagnosing problems —
      `trace` may leak frame contents into the Supervisor log.
  idle_timeout_ms:
    name: "Session idle timeout (ms)"
    description: >-
      A session is closed after this many milliseconds of inactivity. Default
      120000 (2 minutes). Increase only if clients keep long-idle sessions open.
  max_frame_bytes:
    name: "Max frame size (bytes)"
    description: >-
      Reject any single WebSocket frame larger than this. Default 1048576 (1 MiB).
      Larger frames are inefficient over HTTPS bridging anyway; raise only if
      you have a specific reason.
  frontend_proxy_enabled:
    name: "Enable Home Assistant frontend proxy"
    description: >-
      Expose the Home Assistant web UI through this add-on and inject a WebSocket
      fallback shim. This lets browsers use the UI through HTTPS/SSE when native
      WebSockets are blocked. The bridge API paths `/v1`, `/_` and `/healthz`
      remain reserved for the add-on.
  frontend_proxy_path:
    name: "Frontend proxy path"
    description: >-
      Path where the proxied Home Assistant UI is mounted. Use `/` for the most
      transparent mode; advanced users may use a subpath, but some HA frontend
      assets use absolute URLs.
  frontend_proxy_upstream_url:
    name: "Frontend upstream URL"
    description: >-
      HTTP URL of Home Assistant Core for the web UI proxy. Default
      `http://homeassistant:8123`.
  frontend_proxy_inject_websocket_shim:
    name: "Inject WebSocket shim"
    description: >-
      Inject a small module into HTML responses that replaces HA's `/api/websocket`
      connection with the https2wss bridge fallback.
  frontend_proxy_bridge_url:
    name: "Public bridge URL override"
    description: >-
      Optional public URL the injected shim should use for bridge calls. Leave
      empty to use the browser's current origin.
  frontend_proxy_transport:
    name: "Frontend bridge receive transport"
    description: >-
      Receive transport used by the injected Home Assistant WebSocket shim.
      Use `long_poll` for restrictive networks and reverse proxies that break
      streaming fetch/SSE; use `sse` only when streaming is known to be stable.
  frontend_proxy_native_connect_timeout_ms:
    name: "Native WebSocket timeout (ms)"
    description: >-
      How long the shim tries a native WebSocket before falling back to the bridge.
      Set to 0 to fall back immediately in heavily restricted networks.
  frontend_proxy_heartbeat_timeout_ms:
    name: "WebSocket heartbeat timeout (ms)"
    description: >-
      If the native WebSocket opens but then receives no messages for this long,
      the shim switches to the bridge.

network:
  8080/tcp: "https2wss bridge HTTP API (POST /v1/sessions, GET /events, …)"
