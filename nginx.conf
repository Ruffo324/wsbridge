server {
    listen 80;
    server_name _;

    # Browser SSE demo page
    root /srv/html;
    index index.html;

    # /lib/client/* → packages/client/dist/*
    location /lib/client/ {
        alias /srv/lib/client/;
    }

    # /lib/protocol/* → packages/protocol/dist/*
    location /lib/protocol/ {
        alias /srv/lib/protocol/;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
